<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>克拉云机场发布页</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #1d1d1f;
    }

    .card {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 90%;
      max-width: 380px;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #ff2d55;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: #007aff;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">克拉云机场发布页</div>
    <div class="subtitle">请收藏本地址永久不迷路</div>
    <a href="https://bbbboo.klyfunny.org" class="btn">点我进入机场官网</a>
  </div>

</body>
</html>
